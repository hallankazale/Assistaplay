name: AssistaPay Core Tests

on:
  push:
    branches:
      - main
      - 'refactor/**'
      - 'feature/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  core-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verificar sintaxe do app atual
        run: node --check app.js

      - name: Verificar sintaxe dos módulos
        run: |
          node --check src/core/config.js
          node --check src/core/storage.js
          node --check src/core/permissions.js
          node --check src/core/auth.js
          node --check src/core/migrations.js
          node --check src/core/database.js
          node --check src/core/events.js
          node --check src/core/features.js
          node --check src/core/router.js
          node --check src/core/engine.js
          node --check src/core/logger.js
          node --check src/bootstrap.js
          node --check src/adapters/legacy-auth-adapter.js
          node --check src/adapters/legacy-navigation-adapter.js
          node --check src/modules/session/session.module.js
          node --check src/modules/auth/auth.module.js

      - name: Executar testes centrais
        run: node tests/core-smoke.test.js

      - name: Validar integração modular
        run: node tests/integration-order.test.js

      - name: Testar sessão e autenticação
        run: node tests/auth-module.test.js
