name: Publicar Preview AssistaPay

on:
  push:
    branches:
      - refactor/estrutura-profissional-v2
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-preview
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Montar site de preview
        run: |
          mkdir -p _site/src
          cp integration/index.html _site/index.html
          cp integration/feed-preview.html _site/feed.html
          sed -i 's#../src/#./src/#g' _site/index.html
          sed -i 's#../src/#./src/#g' _site/feed.html
          cp -R src/core _site/src/core
          cp -R src/modules _site/src/modules
          cp -R src/styles _site/src/styles
          touch _site/.nojekyll

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
