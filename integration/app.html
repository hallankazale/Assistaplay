<body>
  <div id="appPage"></div>
  <script src="../src/core/config.js"></script>
  <script src="../src/core/storage.js"></script>

  <script src="../src/core/auth.js"></script>

  <script src="../src/core/logger.js"></script>
  <script src="../src/modules/session/session.module.js"></script>
  <script src="../src/modules/auth/auth.module.js"></script>
  <script src="../src/modules/publications/publication.store.js"></script>
  <script src="../src/modules/stories/story-lifecycle.js"></script>
  <script src="../src/modules/stories/story.service.js?v=716ad790"></script>
  <script src="../src/modules/avatar/avatar-story.js?v=4485255b"></script>
  <script src="../src/modules/wallet/wallet.ui.js"></script>
  <script src="../src/modules/profile/profile.ui.js"></script>
  <script src="../src/modules/profile/profile-favorites.js"></script>
  <script src="../src/modules/profile/public-profile.js"></script>
  <script src="../src/modules/create/create.ui.js"></script>
  <script src="../src/modules/seller/seller-center.ui.js"></script>
  <script src="../src/modules/search/search.store.js"></script>
  <script src="../src/modules/search/search.service.js"></script>
  <script src="../src/modules/search/search.ui.js"></script>
  <script src="../src/modules/notifications/notifications.store.js"></script>
  <script src="../src/modules/notifications/notifications.ui.js"></script>
  <script src="../src/modules/messages/messages.store.js"></script>
  <script src="../src/modules/messages/messages.ui.js"></script>
  <script src="../src/modules/navigation/pages.ui.js"></script>
  <script src="../src/modules/affiliates/affiliate-showcase.js"></script>
  <script src="../src/modules/affiliate/development-affiliate-sync.js"></script>
  <script src="../src/modules/checkout/checkout.ui.js"></script>
  <script src="../src/modules/navigation/bottom-nav.js"></script>
  <script>
    window.AssistaPay.engine.start();
    const session=window.AssistaPay.engine.get('session');
    if(!session?.isAuthenticated?.()){
      window.location.replace('index.html');
    }else{
      const container=document.getElementById('appPage');
      const params=new URLSearchParams(window.location.search);
      const view=params.get('view');
      if(view==='wallet')window.AssistaPay.walletUI.render(container);
      else if(view==='profile')window.AssistaPay.profileUI.render(container);
      else if(view==='showcase')window.AssistaPay.affiliateShowcase.renderPage(container);
      else if(view==='create'){
        window.AssistaPay.createUI.render(container);
        window.AssistaPay.affiliateShowcase?.mount(container);
      }
      else if(view==='seller-center')window.AssistaPay.sellerCenterUI.render(container);
      else if(view==='notifications')window.AssistaPay.notificationsUI.render(container);
      else if(view==='messages')window.AssistaPay.messagesUI.render(container);
      else if(view==='checkout')window.AssistaPay.checkoutUI.render(container);
      else if(view==='search'){
        window.AssistaPay.searchUI.render(container);
        const userId=params.get('user');
        if(userId)window.AssistaPay.publicProfile?.open(userId);
      }else{
        window.AssistaPay.pagesUI.render(container);
        window.AssistaPay.checkoutUI?.enhance(container);
      }
      window.AssistaPay.bottomNav?.sync(container);
      window.AssistaPay.avatarStory?.rebuild?.();
    }
  </script>
</body>
</html>
