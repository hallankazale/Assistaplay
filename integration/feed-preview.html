<body>
  <div class="ap-app-shell">
    <main id="feed" class="ap-feed" aria-label="Feed de vídeos"></main>
    <nav class="ap-bottom-nav ap-bottom-nav-six" aria-label="Menu principal">
      <a class="active" href="../feed.html"><span>⌂</span><small>Feed</small></a>
      <a href="../app.html?view=search"><span>⌕</span><small>Buscar</small></a>
      <a href="../app.html?view=shop"><span>🛍</span><small>Loja</small></a>
      <a class="ap-create ap-create-centered" href="../app.html?view=create"><span>+</span><small></small></a>
      <a href="../app.html?view=messages"><span>✉</span><small>Mensagens</small></a>
      <a href="../app.html?view=profile"><span>♙</span><small>Perfil</small></a>
    </nav>
  </div>
  <script src="../src/core/config.js"></script>
  <script src="../src/core/storage.js"></script>
  <script src="../src/core/permissions.js"></script>
  <script src="../src/core/auth.js"></script>
  <script src="../src/core/migrations.js"></script>

  <script src="../src/core/engine.js"></script>
  <script src="../src/core/logger.js"></script>
  <script src="../src/modules/system/account-history.js?v=stories-premium-1"></script>
  <script src="../src/modules/session/session.module.js"></script>
  <script src="../src/modules/auth/auth.module.js"></script>
  <script src="../src/modules/publications/publication.store.js"></script>
  <script src="../src/modules/stories/story-archive.js?v=stories-premium-1"></script>
  <script src="../src/modules/stories/story-lifecycle.js"></script>
  <script src="../src/modules/stories/story.service.js?v=34f7633c"></script>
  <script src="../src/modules/avatar/avatar-story.js?v=b6ea1ebd"></script>
  <script src="../src/modules/profile/profile-favorites.js?v=stories-premium-1"></script>
  <script src="../src/modules/feed/feed-comments-v3.js?v=stories-premium-1"></script>
  <script src="../src/modules/feed/feed.ui.js?v=9fa888d4"></script>
  <script>
    (function(){
      const AP=window.AssistaPay||{};
      const host=document.getElementById('feed');
      try{
        AP.engine?.start?.();
        Promise.resolve(AP.feedUI?.render?.(host)).then(()=>{
          AP.avatarStory?.rebuild?.();
          AP.accountHistory?.record?.('feed.opened',{label:'Feed aberto'});
        }).catch(error=>{
          console.error(error);
          host.innerHTML='<section class="ap-feed-empty"><div><h1>AssistaPay</h1><p>Não foi possível carregar o feed.</p></div></section>';
        });
      }catch(error){
        console.error(error);
        host.innerHTML='<section class="ap-feed-empty"><div><h1>AssistaPay</h1><p>Não foi possível carregar o feed.</p></div></section>';
      }
    })();
  </script>
</body>
