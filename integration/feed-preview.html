<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>AssistaPay — Feed Preview</title>
  <link rel="stylesheet" href="../src/styles/design-system.css">
  <link rel="stylesheet" href="../src/styles/feed.css">
</head>
<body>
  <div class="ap-app-shell">
    <main id="feed" class="ap-feed" aria-label="Feed de vídeos"></main>
    <nav class="ap-bottom-nav" aria-label="Menu principal">
      <button class="active"><span>⌂</span><small>Início</small></button>
      <button><span>▣</span><small>Shop</small></button>
      <button><span>◎</span><small>Missões</small></button>
      <button><span>▤</span><small>Carteira</small></button>
      <button><span>♙</span><small>Perfil</small></button>
    </nav>
  </div>

  <script src="../src/core/config.js"></script>
  <script src="../src/core/storage.js"></script>
  <script src="../src/core/permissions.js"></script>
  <script src="../src/core/auth.js"></script>
  <script src="../src/core/migrations.js"></script>
  <script src="../src/core/database.js"></script>
  <script src="../src/core/events.js"></script>
  <script src="../src/core/features.js"></script>
  <script src="../src/core/router.js"></script>
  <script src="../src/core/engine.js"></script>
  <script src="../src/core/logger.js"></script>
  <script src="../src/modules/recommendation/recommendation.module.js"></script>
  <script src="../src/modules/feed/feed.ui.js"></script>
  <script>
    window.AssistaPay.engine.start();
    window.AssistaPay.feedUI.render(document.getElementById('feed'));
  </script>
</body>
</html>
