<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>AssistaPay — Para você</title>
  <link rel="stylesheet" href="../src/styles/consolidated.css?v=9897cbc0">
</head>
<body>
  <div class="ap-app-shell">
    <main id="feed" class="ap-feed" aria-label="Feed de vídeos"></main>
    <nav class="ap-bottom-nav" aria-label="Menu principal">
      <a class="active" href="feed.html"><span>⌂</span><small>Início</small></a>
      <a href="app.html?view=search"><span>⌕</span><small>Pesquisar</small></a>
      <a class="ap-create" href="app.html?view=create"><span>+</span><small></small></a>
      <a href="app.html?view=messages"><span>✉</span><small>Mensagens</small></a>
      <a href="app.html?view=profile"><span>♙</span><small>Perfil</small></a>
    </nav>
  </div>
  <script src="../src/core/config.js"></script>
  <script src="../src/core/storage.js"></script>
  <script src="../src/core/permissions.js"></script>
  <script src="../src/core/auth.js"></script>
  <script src="../src/core/migrations.js"></script>
  <script src="../src/core/database.js"></script>
  <script src="../src/core/events.js"></script>
  <script src="../src/core/features.js"></script>
  <script src="../src/core/router.js"></script>
  <script src="../src/core/engine.js"></script>
  <script src="../src/core/logger.js"></script>
  <script src="../src/modules/session/session.module.js"></script>
  <script src="../src/modules/auth/auth.module.js"></script>
  <script src="../src/modules/publications/publication.store.js"></script>
  <script src="../src/modules/stories/story-lifecycle.js"></script>
  <script src="../src/modules/stories/story.service.js?v=consolidation-2"></script>
  <script src="../src/modules/feed/feed.ui.js?v=consolidation-2"></script>
  <script src="../src/modules/avatar/avatar-story.js?v=consolidation-2"></script>
  <script>
    (function(){
      const AP=window.AssistaPay||{};
      const feed=document.getElementById('feed');
      try{
        AP.engine?.start?.();
        Promise.resolve(AP.feedUI?.render?.(feed)).finally(()=>AP.avatarStory?.rebuild?.());
      }catch(error){
        console.error(error);
        feed.innerHTML='<section class="ap-empty"><div><h1>AssistaPay</h1><p>O feed não pôde ser carregado.</p><a class="ap-primary-btn" href="app.html">Abrir aplicativo</a></div></section>';
      }
    })();
  </script>
</body>
</html>
