  <script>
    (function(){
      const AP=window.AssistaPay||{};
      try{AP.engine?.start?.();}catch(error){console.error('Falha ao iniciar o AssistaPay',error);}
      const container=document.getElementById('appPage');
      const params=new URLSearchParams(location.search);
      const view=params.get('view');
      let result;
      try{
        if(view==='wallet')result=AP.walletUI?.render?.(container);
        else if(view==='profile')result=AP.profileUI?.render?.(container);
        else if(view==='settings')result=AP.settingsUI?.render?.(container);
        else if(view==='account-history')result=AP.settingsUI?.renderHistory?.(container);
        else if(view==='showcase')result=AP.affiliateShowcase?.renderPage?.(container);
        else if(view==='create'){
          result=AP.createUI?.render?.(container);
          AP.affiliateShowcase?.mount?.(container);
        }
        else if(view==='seller-center')result=AP.sellerCommerceUI?.render?.(container);
        else if(view==='notifications')result=AP.notificationsUI?.render?.(container);
        else if(view==='messages')result=AP.messagesUI?.render?.(container);
        else if(view==='product')result=AP.productDetailUI?.render?.(container);
        else if(view==='checkout')result=AP.checkoutUI?.render?.(container);
        else if(view==='search'){
          result=AP.searchUI?.render?.(container);
          const userId=params.get('user');
          if(userId)AP.publicProfile?.open?.(userId);
        }else{
          result=AP.pagesUI?.render?.(container);
          AP.checkoutUI?.enhance?.(container);
        }
        if(!['product','settings','account-history'].includes(view))AP.bottomNav?.sync?.(container);
        Promise.resolve(result).finally(()=>{
          AP.avatarStory?.rebuild?.();
          AP.commerceSync?.sync?.();
          AP.accountHistory?.record?.('view.rendered',{label:`Tela exibida: ${view||'início'}`});
        });
      }catch(error){
        console.error(error);
        container.innerHTML='<main class="ap-empty"><div><h1>AssistaPay</h1><p>Um módulo da versão moderna não carregou.</p><a class="ap-primary-btn" href="../feed.html">Abrir feed</a></div></main>';
      }
    })();
  </script>
